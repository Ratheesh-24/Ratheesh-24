<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="1200" height="240" role="img" aria-label="Ratheesh Karnan — Full-Stack Engineer · AI & RAG Builder">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="240" fill="url(#bg)"/>
  <rect width="1200" height="240" fill="url(#grid)"/>

  <!-- decorative glowing circles -->
  <circle cx="1050" cy="60" r="120" fill="#38bdf8" opacity="0.12"/>
  <circle cx="150" cy="200" r="140" fill="#0ea5e9" opacity="0.10"/>
  <circle cx="900" cy="190" r="60" fill="#7dd3fc" opacity="0.15"/>

  <!-- code-window accent top-left -->
  <g transform="translate(60, 50)" opacity="0.85">
    <circle cx="0" cy="0" r="6" fill="#ef4444"/>
    <circle cx="18" cy="0" r="6" fill="#f59e0b"/>
    <circle cx="36" cy="0" r="6" fill="#10b981"/>
  </g>

  <!-- terminal prompt -->
  <text x="60" y="105" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" fill="#7dd3fc" opacity="0.85">
    <tspan fill="#94a3b8">$</tspan> whoami
  </text>

  <!-- main name -->
  <text x="60" y="158" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="58" font-weight="700" fill="#ffffff" letter-spacing="-1">
    Ratheesh Karnan
  </text>

  <!-- tagline -->
  <text x="62" y="192" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="17" fill="#7dd3fc" letter-spacing="0.3">
    Full-Stack Engineer  ·  AI &amp; RAG Builder
  </text>

  <!-- accent underline -->
  <rect x="60" y="208" width="120" height="3" fill="url(#accent)" rx="1.5"/>

  <!-- right-side location pill -->
  <g transform="translate(1000, 150)">
    <rect x="0" y="0" width="150" height="34" rx="17" fill="#ffffff" opacity="0.10"/>
    <circle cx="20" cy="17" r="5" fill="#38bdf8"/>
    <text x="34" y="22" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#e0f2fe">
      Chennai, India
    </text>
  </g>

  <!-- bottom wave -->
  <path d="M0,210 Q300,240 600,215 T1200,210 L1200,240 L0,240 Z" fill="#ffffff" opacity="0.06"/>
  <path d="M0,220 Q300,245 600,225 T1200,220 L1200,240 L0,240 Z" fill="#ffffff" opacity="0.10"/>
</svg>
